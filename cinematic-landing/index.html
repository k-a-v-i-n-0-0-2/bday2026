<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Romantic Experience</title>
    <link rel="stylesheet" href="style.css">
    <!-- GSAP & ScrollTrigger -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

    <!-- Video Element -->
    <!-- Muted, playsinline, and preload="auto" ensure it loads well for scrubbing without autoplay -->
    <video id="hero-video" src="assets/love.mp4" muted playsinline preload="auto"></video>
    
    <!-- Dark Gradient Overlay for depth -->
    <div class="video-overlay"></div>

    <!-- Scroll Content -->
    <div class="scroll-container">
        <section class="hero-section" style="position: relative;">
            <div style="position: absolute; right: 8vw; top: 50%; transform: translateY(-50%); text-align: right; width: 100%; max-width: 600px;">
                <h1 class="fade-text" style="font-family: 'Playfair Display', serif; font-style: italic; font-weight: 600; font-size: clamp(2.5rem, 5vw, 5rem); margin-bottom: 0.5rem; text-shadow: 2px 2px 8px rgba(0,0,0,0.8);">Happy 20th Birthday, My Love</h1>
                <p class="fade-text subtitle" style="text-shadow: 1px 1px 4px rgba(0,0,0,0.8);">Scroll to experience our journey...</p>
            </div>
        </section>
        
        <section class="spacer-section"></section>
        
        <section class="end-section">
            <h2 class="fade-text">Forever & Always</h2>
        </section>
    </div>

    <!-- Minimal stars -->
    <div id="stars-container"></div>

    <script src="script.js"></script>
</body>
</html>
