# Netlify Configuration for Priya's Birthday Site
# ------------------------------------------------
# This file handles proxying requests to your Render backend.
# IMPORTANT: Replace "https://bday2026-2.onrender.com" with your actual Render service URL
# (e.g., https://priya-bday-api.onrender.com)

[build]
  publish = "public"

[[redirects]]
  from = "/api/*"
  to = "https://bday2026-2.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/auth/*"
  to = "https://bday2026-2.onrender.com/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/login"
  to = "https://bday2026-2.onrender.com/login"
  status = 200
  force = true

[[redirects]]
  from = "/logout"
  to = "https://bday2026-2.onrender.com/logout"
  status = 200
  force = true

[[redirects]]
  from = "/stream-intro"
  to = "https://bday2026-2.onrender.com/stream-intro"
  status = 200
  force = true

[[redirects]]
  from = "/stream-video"
  to = "https://bday2026-2.onrender.com/stream-video"
  status = 200
  force = true

[[redirects]]
  from = "/netflix-upload"
  to = "/upload.html"
  status = 200

[[redirects]]
  from = "/kavin_priya/*"
  to = "https://bday2026-2.onrender.com/kavin_priya/:splat"
  status = 200
  force = true

# Default fallback for SPA-like behavior (optional)
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200
